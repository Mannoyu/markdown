<script>
  // js灵活，高级脚本语言 不太关注内存
  // [],{}
  // 最常用 方括号加元素
  // 如果不知道组内的元素设置[] 特定的存储结构 一段连续的内存空间 

  const arr = [1, 2, 3, 4, 5];
  arr.push(6); // 返回了数组的长度 6 副作用 修改了原数组
  arr.shift();
  arr.pop();
  arr.unshift(0);
  arr.pop();
  console.log(arr);
</script>
