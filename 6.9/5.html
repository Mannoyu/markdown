<script>
  //二维数组初始化
  const arr = new Array(3).fill(0).map(() => new Array(3).fill(0));
  arr[0][0] = 1;
  console.log(arr);
  const arr1 = new Array(7).fill([]);
  let length = arr1.length;
  for (let i = 0; i < length; i++) {
    arr1[i] = new Array(3).fill(0);
  }
  console.log(arr1);
  //二维数组遍历优化
  for (let i = 0; i < length; i++) {
    for (let j = 0; j < 3; j++) {
      console.log(arr1[i][j]);
    }
  }
  //把length封装成一个给一个变量
</script>
